name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Run_Tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cpp_standard: [11, 14, 17, 20, 23, 26]
    name: "C++${{ matrix.cpp_standard }} Test"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GCC 13
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13
          echo "CXX=g++-13" >> $GITHUB_ENV
          echo "CC=gcc-13" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -S tests/ -B tests/bin/Debug \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_STANDARD=${{ matrix.cpp_standard }} \
          -DCMAKE_CXX_STANDARD_REQUIRED=ON

      - name: Build
        run: cmake --build tests/bin/Debug --clean-first

      - name: Run Tests
        run: tests/bin/Debug/BigInt_gtest --gtest_color=no --gtest_filter=*-Test_BigInt_Performance.*
